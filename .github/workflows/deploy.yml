name: Deploy to production

# On every push to main, hand the new commits to the production server's bare repo.
# The server's post-receive hook then checks out + runs deploy.sh automatically.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never interrupt a deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Push to server → triggers auto-deploy hook
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          export GIT_SSH_COMMAND="sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          git remote add production ssh://u715768425@217.21.90.20:65002/home/u715768425/repos/fannan.git
          echo "Pushing $(git rev-parse --short HEAD) to production..."
          git push production HEAD:main
          echo "Pushed — server hook is deploying."
